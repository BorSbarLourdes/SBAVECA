<div class="d-flex flex-column flex-lg-row">
    <!--begin::Sidebar-->
    <div class="flex-column flex-lg-row-auto w-100 w-lg-200px w-xl-300px mb-10">
        <!--begin::Card-->
        <div class="card card-flush">
            <!--begin::Card header-->
            <div class="card-header">
                <!--begin::Card title-->
                <div class="card-title">
                    <h2 class="mb-0">
                        {{ (role$ | async)?.name }}
                    </h2>
                </div>
                <!--end::Card title-->
            </div>
            <!--end::Card header-->
            <!--begin::Card body-->
            <div class="card-body pt-0">
                <!--begin::Permissions-->
                <div class="d-flex flex-column text-gray-600">
                    <ng-container *ngIf="role$ | async as role">
                        <ng-container *ngFor="let permission of role.permissions; let i = index">
                            <div class="d-flex align-items-center py-2" *ngIf="i < 5">
                                <span class="bullet bg-primary me-3"></span>
                                {{ permission.name }}
                            </div>
                            <div class="d-flex align-items-center py-2" *ngIf="i === 5 && role.permissions?.length && role.permissions.length > 5">
                                <span class="bullet bg-primary me-3"></span>
                                <em>and {{ role.permissions.length - 5 }} more...</em>
                            </div>
                        </ng-container>
                    </ng-container>
                </div>
                <!--end::Permissions-->
            </div>
            <!--end::Card body-->
            <!--begin::Card footer-->
            <div class="card-footer pt-0">
                <button type="button" class="btn btn-light btn-active-primary" (click)="openEditModal()">Edit Role</button>
            </div>
            <!--end::Card footer-->
        </div>
        <!--end::Card-->
    </div>
    <!--end::Sidebar-->
    <!--begin::Content-->
    <div class="flex-lg-row-fluid ms-lg-10">
        <!--begin::Card-->
        <div class="card card-flush mb-6 mb-xl-9">
            <!--begin::Card header-->
            <div class="card-header pt-5">
                <!--begin::Card title-->
                <div class="card-title">
                    <h2 class="d-flex align-items-center">Users Assigned
                        <ng-container *ngIf="role$ | async as role">
                            <span class="text-gray-600 fs-6 ms-1">({{ role.users.length }})</span>
                        </ng-container>
                    </h2>
                </div>
                <!--end::Card title-->
                <!--begin::Card toolbar-->
                <div class="card-toolbar">
                </div>
                <!--end::Card toolbar-->
            </div>
            <!--end::Card header-->
            <!--begin::Card body-->
            <div class="card-body pt-0">
                <!--begin::Table-->
                <app-crud [datatableConfig]="datatableConfig" (deleteEvent)="deleteUser($event)" [reload]="reloadEvent"></app-crud>
                <!--end::Table-->
            </div>
            <!--end::Card body-->
        </div>
        <!--end::Card-->
    </div>
    <!--end::Content-->
</div>

<ng-template #formModal let-modal>
    <form #myForm="ngForm" (ngSubmit)="onSubmit($event, myForm)">
      <div class="modal-header">
        <h4 class="modal-title" id="modal-basic-title">Role Details</h4>
        <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss('Cross click')"></button>
      </div>
      <div class="modal-body">
        <div class="d-flex flex-column scroll-y me-n7 pe-7 mw-650px" id="kt_modal_update_customer_scroll" data-kt-scroll="true" data-kt-scroll-activate="{default: false, lg: true}" data-kt-scroll-max-height="auto" data-kt-scroll-dependencies="#kt_modal_update_customer_header" data-kt-scroll-wrappers="#kt_modal_update_customer_scroll"
          data-kt-scroll-offset="300px">
          <!--begin::User toggle-->
          <div class="fw-bold fs-3 rotate collapsible mb-7">Role Details</div>
          <!--end::User toggle-->
          <!--begin::User form-->
          <div class="collapse show">
            <!--begin::Input group-->
            <div class="fv-row mb-7">
              <!--begin::Label-->
              <label class="required fw-semibold fs-6 mb-2">Role Name</label>
              <!--end::Label-->
              <!--begin::Input-->
              <input type="text" class="form-control form-control-solid" name="name" [(ngModel)]="roleModel.name" #name="ngModel" required minlength="4" />
              <div *ngIf="myForm.submitted && myForm.invalid" class="fv-plugins-message-container fv-plugins-message-container--enabled invalid-feedback">
                <div *ngIf="name.errors?.['required']">Role name is required</div>
                <div *ngIf="name.errors?.['minlength']">Role name must be at least 4 characters long</div>
              </div>
              <!--end::Input-->
            </div>
            <!--end::Input group-->

            <!--begin::Permissions group-->
            <div class="mb-7">
              <label class="required fw-semibold fs-6 mb-5">Permissions</label>
              <div class="row row-cols-1 row-cols-sm-2">
                <div class="col" *ngFor="let perm of permissions">
                  <div class="form-check form-check-custom form-check-solid mb-4">
                    <input class="form-check-input me-3" 
                           id="kt_modal_role_perm_{{ perm.id }}" 
                           name="perm_{{ perm.id }}" 
                           type="checkbox" 
                           [checked]="isPermissionSelected(perm.id)"
                           (change)="togglePermission(perm)" />
                    <label class="form-check-label" for="kt_modal_role_perm_{{ perm.id }}">
                      <span class="fw-bold text-gray-800">{{ perm.name }}</span>
                    </label>
                  </div>
                </div>
              </div>
            </div>
            <!--end::Permissions group-->
          </div>
          <!--end::User form-->
        </div>
      </div>
      <div class="modal-footer flex-center">
        <!--begin::Button-->
        <button type="reset" class="btn btn-light me-3" (click)="modal.dismiss('cancel')">
          Discard
        </button>
        <!--end::Button-->
  
        <!--begin::Button-->
        <button type="submit" class="btn btn-primary" [attr.data-kt-indicator]="isLoading ? 'on' : 'off'">
          <span class="indicator-label">
            Submit
          </span>
          <span class="indicator-progress">
            Please wait... <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
          </span>
        </button>
        <!--end::Button-->
      </div>
    </form>
</ng-template>
