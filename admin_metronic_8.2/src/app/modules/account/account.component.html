<ng-container *ngIf="user$ | async as _user">
  <div class="card mb-5 mb-xl-10">
    <div class="card-body pt-9 pb-0">
      <div class="d-flex flex-wrap flex-sm-nowrap mb-3">
        <!-- Profile Picture Placeholder -->
        <div class="me-7 mb-4">
          <div class="symbol symbol-70px symbol-lg-90px symbol-fixed position-relative">
            <img src="./assets/media/avatars/blank.png" alt="Avatar Vacío" />
            <div class="position-absolute translate-middle bottom-0 start-100 mb-4 bg-success rounded-circle border border-4 border-white h-15px w-15px"></div>
          </div>
        </div>

        <!-- User Information details -->
        <div class="flex-grow-1">
          <div class="d-flex justify-content-between align-items-start flex-wrap mb-2">
            <div class="d-flex flex-column">
              <div class="d-flex align-items-center mb-2">
                <a class="text-gray-900 text-hover-primary fs-1 fw-bolder me-1 cursor-pointer" style="font-family: 'Playfair Display', Georgia, serif;">
                  {{ _user.fullname || _user.username }}
                </a>
              </div>

              <!-- Basic details: Email & Role -->
              <div class="d-flex flex-wrap fw-semibold fs-5 mb-4 pe-2">
                <span class="d-flex align-items-center text-gray-700 me-6 mb-2">
                  <app-keenicon name="profile-circle" class="fs-3 me-2 text-brand-title"></app-keenicon>
                  Rol: {{ _user.role || 'Usuario' }}
                </span>
                <span class="d-flex align-items-center text-gray-700 mb-2">
                  <app-keenicon name="sms" class="fs-3 me-2 text-brand-title"></app-keenicon>
                  {{ _user.email }}
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Navigation Tabs (Only settings / Configuración) -->
      <div class="d-flex h-55px">
        <ul class="nav nav-stretch nav-line-tabs nav-line-tabs-2x border-transparent fs-5 fw-bolder flex-nowrap">
          <li class="nav-item">
            <a
              class="nav-link text-active-primary me-6"
              routerLink="/crafted/account/settings"
              routerLinkActive="active"
            >
              Configuración
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</ng-container>

<router-outlet></router-outlet>
