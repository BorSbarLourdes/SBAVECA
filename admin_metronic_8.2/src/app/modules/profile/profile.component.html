<div class="card mb-5 mb-xl-10">
  <div class="card-body pt-9 pb-0">
    <div class="d-flex flex-wrap flex-sm-nowrap mb-3">
      <!-- Photo removed -->
      <div class="flex-grow-1">
        <div class="d-flex justify-content-between align-items-start flex-wrap mb-2">
          <div class="d-flex flex-column">
            <div class="d-flex align-items-center mb-2">
              <a class="text-gray-800 text-hover-primary fs-2 fw-bolder me-1 cursor-pointer">
                {{ user?.fullname || 'Usuario' }}
              </a>
            </div>

            <div class="d-flex flex-wrap fw-bold fs-6 mb-4 pe-2">
              <a class="d-flex align-items-center text-gray-500 text-hover-primary me-5 mb-2 cursor-pointer">
                <app-keenicon name="profile-circle" class="fs-4 me-1"></app-keenicon>
                {{ user?.role || 'Personal SBAVECA' }}
              </a>
              <a class="d-flex align-items-center text-gray-500 text-hover-primary me-5 mb-2 cursor-pointer">
                <app-keenicon name="phone" class="fs-4 me-1"></app-keenicon>
                {{ user?.phone || 'Sin teléfono' }}
              </a>
              <a class="d-flex align-items-center text-gray-500 text-hover-primary mb-2 cursor-pointer">
                <app-keenicon name="sms" class="fs-4 me-1"></app-keenicon>
                {{ user?.email || 'email@ejemplo.com' }}
              </a>
            </div>
          </div>
          <div class="d-flex my-4">
            <!-- Removed Follow/Hire Me buttons -->
          </div>
        </div>
      </div>
    </div>
    <div class="d-flex overflow-auto h-55px">
      <!-- Nav tabs removed -->
    </div>
  </div>
</div>

<div class="card mb-5 mb-xl-10">
  <div class="card-header border-0 cursor-pointer" role="button">
    <div class="card-title m-0">
      <h3 class="fw-bolder m-0">Detalles de la Cuenta</h3>
    </div>
  </div>

  <div class="card-body border-top p-9">
    <form (ngSubmit)="saveProfile()" #profileForm="ngForm">
      
      <div class="row mb-6">
        <label class="col-lg-4 col-form-label required fw-bold fs-6">Nombre y Apellido</label>
        <div class="col-lg-8">
          <div class="row">
            <div class="col-lg-6 fv-row">
              <input type="text" class="form-control form-control-lg form-control-solid mb-3 mb-lg-0" placeholder="Nombre" name="firstname" [(ngModel)]="user.firstname" [disabled]="!hasAction('update')" />
            </div>
            <div class="col-lg-6 fv-row">
              <input type="text" class="form-control form-control-lg form-control-solid" placeholder="Apellido" name="lastname" [(ngModel)]="user.lastname" [disabled]="!hasAction('update')" />
            </div>
          </div>
        </div>
      </div>

      <div class="row mb-6">
        <label class="col-lg-4 col-form-label required fw-bold fs-6">Fecha de Nacimiento</label>
        <div class="col-lg-8 fv-row">
          <input type="date" class="form-control form-control-lg form-control-solid" name="dob" [(ngModel)]="user.dob" [disabled]="!hasAction('update')" />
        </div>
      </div>

      <div class="row mb-6">
        <label class="col-lg-4 col-form-label required fw-bold fs-6">Teléfono</label>
        <div class="col-lg-8 fv-row">
          <input type="tel" class="form-control form-control-lg form-control-solid" placeholder="Teléfono" name="phone" [(ngModel)]="user.phone" [disabled]="!hasAction('update')" />
        </div>
      </div>

      <div class="row mb-6">
        <label class="col-lg-4 col-form-label required fw-bold fs-6">Dirección</label>
        <div class="col-lg-8 fv-row">
          <input type="text" class="form-control form-control-lg form-control-solid" placeholder="Dirección (Calle, número)" name="address" [(ngModel)]="user.address.addressLine" [disabled]="!hasAction('update')" />
        </div>
      </div>

      <div class="row mb-6">
        <label class="col-lg-4 col-form-label required fw-bold fs-6">Ciudad y Estado/Provincia</label>
        <div class="col-lg-8">
          <div class="row">
            <div class="col-lg-6 fv-row">
              <input type="text" class="form-control form-control-lg form-control-solid mb-3 mb-lg-0" placeholder="Ciudad" name="city" [(ngModel)]="user.address.city" [disabled]="!hasAction('update')" />
            </div>
            <div class="col-lg-6 fv-row">
              <input type="text" class="form-control form-control-lg form-control-solid" placeholder="Estado/Provincia" name="state" [(ngModel)]="user.address.state" [disabled]="!hasAction('update')" />
            </div>
          </div>
        </div>
      </div>

      <div class="row mb-6">
        <label class="col-lg-4 col-form-label required fw-bold fs-6">Código Postal y País</label>
        <div class="col-lg-8">
          <div class="row">
            <div class="col-lg-6 fv-row">
              <input type="text" class="form-control form-control-lg form-control-solid mb-3 mb-lg-0" placeholder="Código Postal" name="zip" [(ngModel)]="user.address.postCode" [disabled]="!hasAction('update')" />
            </div>
            <div class="col-lg-6 fv-row">
              <input type="text" class="form-control form-control-lg form-control-solid" placeholder="País" name="country" [(ngModel)]="user.address.country" [disabled]="!hasAction('update')" />
            </div>
          </div>
        </div>
      </div>

      <div class="row mb-6">
        <label class="col-lg-4 col-form-label fw-bold fs-6">Usuario (Opcional)</label>
        <div class="col-lg-8 fv-row">
          <input type="text" class="form-control form-control-lg form-control-solid" placeholder="Usuario" name="username" [(ngModel)]="user.username" [disabled]="!hasAction('update')" />
        </div>
      </div>

      <div class="row mb-6">
        <label class="col-lg-4 col-form-label required fw-bold fs-6">Correo Electrónico</label>
        <div class="col-lg-8 fv-row">
          <input type="email" class="form-control form-control-lg form-control-solid" placeholder="Email" name="email" [(ngModel)]="user.email" [disabled]="!hasAction('update')" />
        </div>
      </div>

      <div class="row mb-6">
        <label class="col-lg-4 col-form-label fw-bold fs-6">Contraseña</label>
        <div class="col-lg-8 fv-row">
          <input type="password" class="form-control form-control-lg form-control-solid" placeholder="••••••••" name="password" [(ngModel)]="user.password" [disabled]="!hasAction('update')" />
          <div class="form-text text-muted">Déjalo en blanco si no deseas cambiar la contraseña.</div>
        </div>
      </div>
      
      <div class="card-footer d-flex justify-content-end py-6 px-9" *ngIf="hasAction('update')">
        <button type="reset" class="btn btn-light btn-active-light-primary me-2">Descartar</button>
        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
      </div>
    </form>
  </div>
</div>

<router-outlet></router-outlet>
