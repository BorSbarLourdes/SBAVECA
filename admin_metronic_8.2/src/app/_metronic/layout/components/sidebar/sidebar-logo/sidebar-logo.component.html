<!--begin::Logo image-->
<a routerLink="/dashboard" class="d-flex align-items-center text-decoration-none">
  <!-- Default logo state -->
  <div class="app-sidebar-logo-default d-flex align-items-center gap-3">
    <img src="./assets/media/sbavecaLogo.png" alt="SBAVECA Logo" class="h-35px" />
    <div class="d-flex flex-column">
      <span class="fs-4 fw-bolder" style="font-family: 'Playfair Display', Georgia, serif; color: #4D2C18 !important; letter-spacing: 0.5px; line-height: 1.2;">SBAVECA</span>
      <span class="text-uppercase fw-semibold" style="font-family: 'Inter', sans-serif; font-size: 0.55rem; color: #8C7060 !important; margin-top: -2px;">Gestión de Negocio</span>
    </div>
  </div>
  <!-- Minimize logo state -->
  <div class="app-sidebar-logo-minimize">
    <img src="./assets/media/sbavecaLogo.png" alt="SBAVECA Logo" class="h-30px" />
  </div>
</a>
<!--end::Logo image-->


<ng-container *ngIf="toggleEnabled">
  <!--begin::Sidebar toggle-->
  <div id="kt_app_sidebar_toggle"
    class="app-sidebar-toggle btn btn-icon btn-shadow btn-sm btn-color-muted btn-active-color-primary body-bg h-30px w-30px position-absolute top-50 start-100 translate-middle rotate"
    [ngClass]="toggleButtonClass" data-kt-toggle="true" [attr.data-kt-toggle-state]="toggleState"
    data-kt-toggle-target="body" [attr.data-kt-toggle-name]="toggleAttr">
    <app-keenicon name="double-left" class="fs-2 rotate-180"></app-keenicon>
  </div>
  <!--end::Sidebar toggle-->
</ng-container>
