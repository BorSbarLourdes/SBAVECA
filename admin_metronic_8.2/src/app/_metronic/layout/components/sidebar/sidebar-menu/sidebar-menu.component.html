<!--begin::Menu wrapper-->
<div id="kt_app_sidebar_menu_scroll" class="scroll-y my-5 mx-3" data-kt-scroll="true" data-kt-scroll-activate="true"
  data-kt-scroll-height="auto" data-kt-scroll-dependencies="#kt_app_sidebar_logo, #kt_app_sidebar_footer"
  data-kt-scroll-wrappers="#kt_app_sidebar_menu" data-kt-scroll-offset="5px" data-kt-scroll-save-state="true">
  <!--begin::Menu-->
  <div class="menu menu-column menu-rounded menu-sub-indention fw-semibold fs-6" id="#kt_app_sidebar_menu"
    data-kt-menu="true" data-kt-menu-expand="false">

    <!-- Dashboard -->
    <div class="menu-item" *ngIf="hasRole([1, 2])">
      <a class="menu-link without-sub" routerLink="/dashboard" routerLinkActive="active">
        <span class="menu-icon">
          <app-keenicon name="home-2" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title" translate="MENU.DASHBOARD"></span>
      </a>
    </div>

    <!-- Separator Operaciones -->
    <div class="menu-item" *ngIf="hasRole([1, 2])">
      <div class="menu-content pt-8 pb-2">
        <span class="menu-section text-muted text-uppercase fs-8 ls-1">Operaciones</span>
      </div>
    </div>

    <!-- Gestión de Stock -->
    <div class="menu-item" *ngIf="hasPermission(2)">
      <a class="menu-link without-sub" routerLink="/stock" routerLinkActive="active">
        <span class="menu-icon">
          <app-keenicon name="cube-2" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title">Gestión de Stock</span>
      </a>
    </div>

    <!-- Gestión de Recetas -->
    <div class="menu-item" *ngIf="hasPermission(3)">
      <a class="menu-link without-sub" routerLink="/recetas" routerLinkActive="active">
        <span class="menu-icon">
          <app-keenicon name="book" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title">Gestión de Recetas</span>
      </a>
    </div>

    <!-- Recetario y Calculadora de Costes -->
    <div class="menu-item" *ngIf="hasPermission(3)">
      <a class="menu-link without-sub" routerLink="/recetario-costes" routerLinkActive="active">
        <span class="menu-icon">
          <app-keenicon name="calculator" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title">Recetario y Costes</span>
      </a>
    </div>

    <!-- Planificación de Menú Semanal (RF08) -->
    <div class="menu-item" *ngIf="hasRole([1, 2])">
      <a class="menu-link without-sub" routerLink="/menu-semanal" routerLinkActive="active">
        <span class="menu-icon">
          <app-keenicon name="calendar" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title">Menú Semanal</span>
      </a>
    </div>

    <!-- Gestión de Pedidos -->
    <div class="menu-item" *ngIf="hasPermission(4)">
      <a class="menu-link without-sub" routerLink="/pedidos" routerLinkActive="active">
        <span class="menu-icon">
          <app-keenicon name="delivery-2" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title">Gestión de Pedidos</span>
      </a>
    </div>

    <!-- Sistema de Ventas -->
    <div class="menu-item" *ngIf="hasPermission(5)">
      <a class="menu-link without-sub" routerLink="/ventas" routerLinkActive="active">
        <span class="menu-icon">
          <app-keenicon name="dollar" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title">Sistema de Ventas</span>
      </a>
    </div>

    <!-- Gestión de Clientes -->
    <div class="menu-item" *ngIf="hasPermission(6)">
      <a class="menu-link without-sub" routerLink="/clientes" routerLinkActive="active">
        <span class="menu-icon">
          <app-keenicon name="profile-circle" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title">Gestión de Clientes</span>
      </a>
    </div>

    <!-- Separator Administración -->
    <div class="menu-item" *ngIf="hasPermission(7)">
      <div class="menu-content pt-8 pb-2">
        <span class="menu-section text-muted text-uppercase fs-8 ls-1">Administración</span>
      </div>
    </div>

    <!-- Gestión de Empleados (RF02) -->
    <div class="menu-item" *ngIf="hasRole([1])">
      <a class="menu-link without-sub" routerLink="/empleados" routerLinkActive="active">
        <span class="menu-icon">
          <app-keenicon name="people" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title">Gestión de Empleados</span>
      </a>
    </div>

    <!-- User Management (Untouched) -->
    <div class="menu-item menu-accordion" data-kt-menu-trigger="click" routerLinkActive="here show"
      *ngIf="hasPermission(7)">
      <span class="menu-link">
        <span class="menu-icon">
          <app-keenicon name="profile-user" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title" data-link="/apps">Manejo de Usuarios</span>
        <span class="menu-arrow"></span>
      </span>
      <div class="menu-sub menu-sub-accordion" routerLinkActive="menu-active-bg">
        <div class="menu-item">
          <a class="menu-link without-sub" routerLinkActive="active" routerLink="/apps/users">
            <span class="menu-bullet">
              <span class="bullet bullet-dot"></span>
            </span>
            <span class="menu-title">Usuarios</span>
          </a>
        </div>
        <div class="menu-item">
          <a class="menu-link without-sub" routerLinkActive="active" routerLink="/apps/roles">
            <span class="menu-bullet">
              <span class="bullet bullet-dot"></span>
            </span>
            <span class="menu-title">Roles</span>
          </a>
        </div>
        <div class="menu-item">
          <a class="menu-link without-sub" routerLinkActive="active" routerLink="/apps/permissions">
            <span class="menu-bullet">
              <span class="bullet bullet-dot"></span>
            </span>
            <span class="menu-title">Permisos</span>
          </a>
        </div>
      </div>
    </div>

  </div>
  <!--end::Menu-->
</div>
<!--end::Menu wrapper-->
