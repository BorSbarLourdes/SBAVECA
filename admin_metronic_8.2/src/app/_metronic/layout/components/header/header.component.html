<!--begin::Header container-->
<div class="app-container" id="kt_app_header_container" [ngClass]="headerContainerCssClass">
  <ng-container *ngIf="appSidebarDefaultCollapseDesktopEnabled">
    <div class="app-sidebar-collapse-d-flex align-items-center me-3">
      <!--begin::sidebar toggle-->
      <div class="btn btn-icon w-auto px-0 btn-color-muted btn-active-icon-primary" data-kt-toggle="true"
        data-kt-toggle-target="body" data-kt-toggle-mode="on" data-kt-toggle-name="app-sidebar-collapse">
        <app-keenicon name="double-right" class="fs-1"></app-keenicon>
      </div>
      <!--end::sidebar toggle-->
    </div>
  </ng-container>

  <ng-container *ngIf="appSidebarDisplay">
    <!--begin::sidebar mobile toggle-->
    <div class="d-flex align-items-center d-lg-none ms-n2 me-2" title="Show sidebar menu">
      <div class="btn btn-icon btn-active-color-primary w-35px h-35px" id="kt_app_sidebar_mobile_toggle">
        <app-keenicon name="abstract-14" class="fs-1"></app-keenicon>
      </div>
    </div>
    <!--end::sidebar mobile toggle-->
    <!--begin::Mobile logo-->
    <div class="d-flex align-items-center flex-grow-1 flex-lg-grow-0">
      <a routerLink="/dashboard" class="d-lg-none d-flex align-items-center gap-2 text-decoration-none">
        <img src="./assets/media/sbavecaLogo.png" alt="SBAVECA Logo" class="h-25px" />
        <span class="fs-4 fw-bold" style="font-family: 'Playfair Display', Georgia, serif; color: #FAF5EB !important; letter-spacing: 0.5px;">SBAVECA</span>
      </a>
    </div>
    <!--end::Mobile logo-->
  </ng-container>

  <ng-container *ngIf="!appSidebarDisplay">
    <!--begin::Logo-->
    <div class="d-flex align-items-center flex-grow-1 flex-lg-grow-0 me-lg-15">
      <a routerLink="/dashboard" class="d-flex align-items-center gap-3 text-decoration-none">
        <img src="./assets/media/sbavecaLogo.png" alt="SBAVECA Logo" class="h-35px" />
        <div class="d-flex flex-column">
          <span class="fs-4 fw-bolder" style="font-family: 'Playfair Display', Georgia, serif; color: #FAF5EB !important; letter-spacing: 0.5px; line-height: 1.2;">SBAVECA</span>
          <span class="text-uppercase fw-semibold" style="font-family: 'Inter', sans-serif; font-size: 0.55rem; color: rgba(250, 245, 235, 0.75) !important; margin-top: -2px;">Gestión de Negocio</span>
        </div>
      </a>
    </div>
    <!--end::Logo-->
  </ng-container>

  <!--begin::Header wrapper-->
  <div class="d-flex align-items-stretch justify-content-end flex-lg-grow-1" id="kt_app_header_wrapper">
    <app-navbar class="app-navbar flex-shrink-0" [appHeaderDefaulMenuDisplay]="appHeaderDefaulMenuDisplay"
      [isRtl]="false"></app-navbar>
  </div>
  <!--end::Header wrapper-->
</div>
<!--end::Header container-->
